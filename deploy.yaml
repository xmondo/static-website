apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-website-deployment
  labels:
    app: static-website
spec:
  replicas: 3
  selector:
    matchLabels:
      app: static-website
  template:
    metadata:
      labels:
        app: static-website
    spec:
      containers:
      - name: dissonance
        image: xlabs.xmondo.com:31005/xmondo/melondust:dream-cluster-image-v3
        ports:
        - containerPort: 80
